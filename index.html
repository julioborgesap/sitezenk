<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Controle de Estoque - Confecção e Vendas</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/produtos.css">
    <link rel="stylesheet" href="css/controle-estoque.css">
    <link rel="stylesheet" href="css/gastos.css">
    <link rel="stylesheet" href="css/configuracoes.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js (gráficos) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- SheetJS (exportação Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>

    <!-- Menu hambúrguer para mobile -->
    <div class="menu-hamburguer" id="menu-hamburguer">
        <i class="fas fa-bars"></i>
    </div>
    <nav class="menu-lateral" id="menu-lateral">
        <div class="logo-area">
            <!-- Espaço para logo .png -->
            <img src="assets/logo.png" alt="Logo da empresa" class="logo-img" id="logo-img">
            <span class="logo-texto">Controle Estoque</span>
        </div>
        <ul class="nav-tabs">
            <li data-tab="dashboard" class="active"><i class="fas fa-chart-line"></i> Dashboard</li>
            <li data-tab="produtos"><i class="fas fa-boxes"></i> Produtos</li>
            <li data-tab="controle-estoque"><i class="fas fa-exchange-alt"></i> Controle de Estoque</li>
            <li data-tab="gastos-producao"><i class="fas fa-coins"></i> Gastos de Produção</li>
            <li data-tab="configuracoes"><i class="fas fa-cog"></i> Configurações</li>
        </ul>
        <div class="botoes-exportacao">
            <button id="exportar-excel" class="btn-exportar"><i class="fas fa-file-excel"></i> Exportar Excel</button>
            <button id="exportar-json" class="btn-exportar"><i class="fas fa-file-code"></i> Exportar JSON</button>
        </div>
    </nav>

    <main class="conteudo-principal">
        <div id="dashboard" class="aba-conteudo active">
            <!-- Conteúdo do dashboard será injetado via JS -->
        </div>
        <div id="produtos" class="aba-conteudo">
            <!-- Conteúdo de produtos -->
        </div>
        <div id="controle-estoque" class="aba-conteudo">
            <!-- Conteúdo de controle de estoque -->
        </div>
        <div id="gastos-producao" class="aba-conteudo">
            <!-- Conteúdo de gastos de produção -->
        </div>
        <div id="configuracoes" class="aba-conteudo">
            <!-- Conteúdo de configurações -->
        </div>
    </main>

    <!-- Modal genérico (reutilizável) -->
    <div id="modal-generico" class="modal">
        <div class="modal-conteudo">
            <div class="modal-header">
                <h3 id="modal-titulo"></h3>
                <span class="modal-fechar">&times;</span>
            </div>
            <div id="modal-corpo" class="modal-corpo"></div>
            <div class="modal-footer">
                <button class="btn-fechar-modal">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Modais específicos podem ser adicionados aqui ou criados dinamicamente -->

    <!-- Scripts JS -->
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/produtos.js"></script>
    <script src="js/controle-estoque.js"></script>
    <script src="js/gastos-producao.js"></script>
    <script src="js/configuracoes.js"></script>
    <script src="js/exports.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
